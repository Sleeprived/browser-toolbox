<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data: blob:; object-src 'none'; base-uri 'self'; form-action 'none'" />
  <meta name="theme-color" content="#15171c" />
  <title>Cron Explainer — Browser Toolbox</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="assets/img/icon-192.png" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="site-header">
    <div class="bar">
      <a class="home" href="index.html">&#8592; Browser Toolbox</a>
    </div>
  </header>

  <main id="main" class="wrap">
    <noscript><div class="msg error">This tool needs JavaScript enabled.</div></noscript>
    <h1>Cron Explainer</h1>
    <p class="lead">Translate a cron schedule into plain English and preview its next run times.</p>

    <div class="card">
      <label for="expr">Cron expression (5 fields, or a nickname like <code>@daily</code>)</label>
      <input type="text" id="expr" class="mono" value="0 9 * * 1-5" autocomplete="off" spellcheck="false" />
      <div class="btn-row">
        <button class="btn secondary" type="button" data-ex="*/15 * * * *">*/15 * * * *</button>
        <button class="btn secondary" type="button" data-ex="0 0 1 * *">0 0 1 * *</button>
        <button class="btn secondary" type="button" data-ex="30 8 * * 1-5">30 8 * * 1-5</button>
        <button class="btn secondary" type="button" data-ex="@hourly">@hourly</button>
      </div>
    </div>

    <div id="error" class="msg error hidden" role="alert"></div>

    <div id="result" class="card hidden">
      <h2>In plain English</h2>
      <p id="description" class="lead" aria-live="polite"></p>
      <h2>Next 5 runs <span id="tzlabel" class="lead"></span></h2>
      <ul id="next-runs" class="next-runs" aria-live="polite"></ul>
    </div>

    <div class="privacy-note">
      <span aria-hidden="true">&#128274;</span>
      <span>Runs entirely in your browser. Times are shown in UTC.</span>
    </div>
  </main>

  <footer class="site-footer">Runs entirely in your browser &middot; no uploads</footer>

  <script type="module" src="src/shared/page.js"></script>
  <script type="module" src="src/cron/cron-ui.js"></script>
</body>
</html>
